<link rel="stylesheet" href="./content.css" />

<if condition="messages.length === 0">
    <greeting-text name="Daniel" suggestionItems='{suggestions}'></greeting-text>
</if>

<for each="message in messages">
    <message-bubble type="{message.type}">{message.text}</message-bubble>
</for>

<script>
    registerComponents([
        { name: "greeting-text", path: "./greeting-text.html" },
        { name: "message-bubble", path: "./message-bubble.html" }
    ]);
</script>

<script>
    const suggestions = [
        "What is the main purpose of this document?",
        "Create a summary of this page",
        "Expand on this topic",
    ];

    const messages = [];

    $listen("send-message", (data) => {
        console.log("Received message:", data);
        messages.push({ type: "user", text: data });

        setTimeout(() => {
            messages.push({
                type: "assistant",
                text: "This is a simulated response from the assistant.",
            });
        }, 1000);
    });
</script>
