<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ladrillos JS</title>
    <script type="module">
        import { registerComponents } from "https://cdn.jsdelivr.net/npm/ladrillosjs@2.0.0-beta.9/dist/index.js";

        registerComponents([
            { name: "header-c", path: "./components/header" },
            { name: "chat-c", path: "./components/content" },
            { name: "input-c", path: "./components/input" },
        ]);
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg,
                    #0d1117 0%,
                    #161b22 50%,
                    #1a1f2e 100%);
            min-height: 100vh;
            /* Fill the viewport and stack children top-to-bottom */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #e6edf3;
        }

        /* Header and input keep their natural height */
        header-c,
        input-c {
            flex: 0 0 auto;
        }

        /* Content grows to fill all remaining space and scrolls on overflow */
        chat-c {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <header-c title="AI Assistant"></header-c>
    <chat-c></chat-c>
    <input-c></input-c>
</body>

</html>
